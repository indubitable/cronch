name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@80f1f1b5b8535b6008af54621665738115346cde
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/big-pickle
          prompt: |
            Review this pull request:
            - Check for code quality issues
            - Look for potential bugs and security vulnerabilities
            - Suggest improvements
            Focus on the code changes in this pull request and provide useful, actionable feedback. Be concise and specific in your comments. Avoid nitpicking and focus on important issues. If there are no issues, say "No issues found.".
            Look for security vulnerabilities, performance issues, and code style problems. Provide clear explanations for any issues you find and suggest how to fix them. If the code looks good, do not make up issues.
